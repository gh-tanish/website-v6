<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page In Progress</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      font-family: 'Space Grotesk', sans-serif;
      background: #0b0d13;
      color: #e6e6e6;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 12px;
    }

    p {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 24px;
    }

    a {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;

      text-decoration: none;
      color: #e6e6e6;

      border: 1px solid rgba(120,130,255,0.3);
      background: rgba(255,255,255,0.05);

      transition: 0.3s ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(120,140,255,0.25);
    }

    nav {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;

      padding: 18px;
      text-align: center;

      background: rgba(10, 12, 18, 0.85);
      backdrop-filter: blur(10px);
    }

    nav a {
      text-decoration: none;
      color: #d0d7ff;
      font-weight: 500;
    }

    nav a:hover {
      color: #ffffff;
    }
  </style>
</head>

<body>

  <h1>This page is in progress</h1>
  <p>Please return to the home page.</p>

  <a href="../index.html">Go to Home</a>

</body>
</html>
