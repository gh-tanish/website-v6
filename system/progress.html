<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page In Progress</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      font-family: 'Space Grotesk', sans-serif;
      color: #e6e6e6;

      background:
        radial-gradient(circle at top, rgba(120,120,255,0.08), transparent 45%),
        radial-gradient(circle at bottom, rgba(155,125,255,0.06), transparent 45%),
        #0b0d13;

      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;

      padding: 14px 18px;

      display: flex;
      justify-content: center;

      background: rgba(10, 12, 18, 0.75);
      backdrop-filter: blur(10px);

      border-bottom: 1px solid rgba(120,130,255,0.12);
      z-index: 1000;
    }

    nav a {
      text-decoration: none;
      color: #d0d7ff;
      font-weight: 500;

      padding: 6px 12px;
      border-radius: 999px;

      transition: 0.25s ease;
    }

    nav a:hover {
      color: #ffffff;
      background: rgba(255,255,255,0.06);
    }

    /* MAIN WRAP (SHIFTED UP) */
    .wrap {
      flex: 1;

      display: flex;
      flex-direction: column;
      justify-content: flex-start; /* changed from center */
      align-items: center;

      padding: 120px 20px 60px; /* more top spacing but not centred */
      text-align: center;
    }

    .card {
      max-width: 520px;
      width: 100%;

      padding: 32px 26px;

      border-radius: 22px;

      background: rgba(18, 20, 28, 0.75);
      border: 1px solid rgba(120,130,255,0.14);

      box-shadow: 0 0 30px rgba(80,100,255,0.08);

      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 2rem;
      font-weight: 700;
    }

    p {
      margin: 0 0 22px 0;
      font-size: 1rem;
      opacity: 0.8;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;

      padding: 10px 18px;
      border-radius: 999px;

      text-decoration: none;

      color: #e6e6e6;

      border: 1px solid rgba(120,130,255,0.3);
      background: rgba(255,255,255,0.05);

      transition: 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(120,140,255,0.25);
      background: rgba(255,255,255,0.08);
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .wrap {
        padding: 100px 16px 40px;
      }

      .card {
        padding: 26px 18px;
        border-radius: 18px;
      }

      h1 {
        font-size: 1.6rem;
      }

      p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="scientia/scientia.html">Scientia</a>
    <a href="vitalis/vitalis.html">Vitalis</a>
    <a href="logos/logos.html">Logos</a>
    <a href="sensus/sensus.html">Sensus</a>
  </nav>

  <div class="wrap">
    <div class="card">
      <h1>This page is in progress</h1>
      <p>Please return to the home page while this section is being developed.</p>

      <a class="btn" href="../index.html">Go to Home</a>
    </div>
  </div>

</body>
</html>
