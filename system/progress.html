<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page In Progress</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      font-family: 'Space Grotesk', sans-serif;

      color: #e8e8ea;

      /* LIGHT GREY DARK THEME */
      background:
        radial-gradient(circle at top, rgba(180,180,190,0.10), transparent 45%),
        radial-gradient(circle at bottom, rgba(150,150,160,0.08), transparent 45%),
        #202226;

      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;

      padding: 14px 18px;

      display: flex;
      justify-content: center;

      background: rgba(40, 42, 48, 0.78);
      backdrop-filter: blur(10px);

      border-bottom: 1px solid rgba(180,180,190,0.18);
      z-index: 1000;
    }

    nav a {
      text-decoration: none;
      color: #d9d9dc;
      font-weight: 500;

      padding: 6px 12px;
      border-radius: 999px;

      transition: 0.25s ease;
    }

    nav a:hover {
      background: rgba(255,255,255,0.06);
      color: #ffffff;
    }

    /* MAIN WRAP */
    .wrap {
      flex: 1;

      display: flex;
      flex-direction: column;
      justify-content: center;  /* <-- change this */
      align-items: center;

      padding: 80px 20px; /* reduce top-heavy padding */
      text-align: center;
    }

    /* CARD */
    .card {
      max-width: 520px;
      width: 100%;

      padding: 32px 26px;

      border-radius: 22px;

      background: rgba(55, 57, 64, 0.65);
      border: 1px solid rgba(180,180,190,0.18);

      box-shadow: 0 0 25px rgba(0,0,0,0.18);

      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 2rem;
      font-weight: 700;
    }

    p {
      margin: 0 0 22px 0;
      font-size: 1rem;
      opacity: 0.85;
      line-height: 1.6;
    }

    /* BUTTON */
    .btn {
      display: inline-block;

      padding: 10px 18px;
      border-radius: 999px;

      text-decoration: none;

      color: #e8e8ea;

      border: 1px solid rgba(180,180,190,0.25);
      background: rgba(255,255,255,0.06);

      transition: 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(160,160,170,0.18);
      background: rgba(255,255,255,0.08);
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .wrap {
        padding: 100px 16px 40px;
      }

      .card {
        padding: 26px 18px;
        border-radius: 18px;
      }

      h1 {
        font-size: 1.6rem;
      }

      p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a>Sorry for the inconvenience!</a>
  </nav>

  <div class="wrap">
    <div class="card">
      <h1>This page is currently in progress.</h1>
      <p>Please return to the home page while this section is being developed.</p>

      <a class="btn" href="../index.html">Go to Home</a>
    </div>
  </div>

</body>
</html>
